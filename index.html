<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horário de levantamento</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family:'Inter',sans-serif;
  background:#f9f9f9;
  margin:0;
  padding:20px;
  color:#333;
}


input[type="date"] {
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:16px;
  padding:10px 15px;
  border:2px solid #b5651d;
  border-radius:8px;
  cursor:pointer;
  color:#333;
  background:#fff;
  transition:0.2s;
}
input[type="date"]:hover{border-color:#a0521a;}
input[type="date"]:focus{outline:none;border-color:#b5651d;box-shadow:0 0 6px rgba(181,101,29,0.4);}

h2{margin:0;font-weight:600;}


.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  width:95%;
  max-width:900px;
  margin:0 auto 30px auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.divider{border:none;height:1px;background:#eee;margin:15px 0;}

.product-name{font-weight:600;margin-bottom:10px;text-align:center;}
.product-name span{color:#b5651d;}


.table-title{font-weight:600;text-align:center;margin-bottom:10px;}


.date-selector{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:20px;}
.date-selector label{font-weight:600;}


table{border-collapse:collapse;margin:0 auto;width:95%;max-width:900px;}
td{
  border:1px solid #a0521a;
  width:18%;
  height:90px;
  text-align:center;
  vertical-align:middle;
  cursor:pointer;
  font-weight:600;
  position:relative;
  transition:0.2s;
}
td:hover{transform:scale(1.05);}
td.full{background:#ff4d4f;color:white;cursor:not-allowed;}
td.green{background:#d9f7be;}
td .remaining{position:absolute;bottom:5px;right:5px;font-size:12px;font-weight:500;}


.modal{display:none;position:fixed;z-index:10;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;border-radius:10px;padding:20px;width:90%;max-width:500px;text-align:center;}
.close{float:right;font-size:25px;font-weight:bold;cursor:pointer;}
.time-circle{width:50px;height:42px;border-radius:12px;background:#d9f7be;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:600;margin:5px;transition:0.2s;}
.time-circle.full{background:#ff4d4f;color:white;cursor:not-allowed;}
.time-circle:hover:not(.full){transform:scale(1.1);}


.selected-time-container{display:none;text-align:center;margin-top:15px;font-weight:600;}
.selected-time-container span{color:#b5651d;font-weight:600;}


@media(max-width:600px){
  td{height:70px;font-size:12px;padding:6px;}
  td .slot-label{font-size:12px;}
  td .remaining{font-size:8px!important;bottom:5px;right:5px;left:5px;text-align:right;}
  .modal-content{max-width:300px;}
}
</style>
</head>
<body>

<div class="card">
  
  <div class="table-title"><h2>Horários de Levantamento</h2></div>
  <hr class="divider">
  <div class="product-name">Produto: <span>Pão de Teste</span></div>

  <div class="date-selector">
    <label for="dateSelect1">Seleccione a data:</label>
    <input type="date" id="dateSelect1">
  </div>

  <table>
    <tbody id="grid1"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime1">Horário de retirada: <span id="selectedHour1"></span></div>

  <hr class="divider" style="margin-top:30px;">

 
  <div class="product-name">Produto: <span>Arrufada</span></div> <br>

  <div class="date-selector">
    <label for="dateSelect2">Seleccione a data:</label>
    <input type="date" id="dateSelect2">
  </div>

  <table>
    <tbody id="grid2"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime2">Horário de retirada: <span id="selectedHour2"></span></div>


  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeBtn" class="close">&times;</span>
      <h2>Selecione o horário disponível</h2> <br>
      <div id="times"></div>
    </div>
  </div>


  <hr class="divider" style="margin-top:30px;">

  <div class="product-name">Produto: <span>Bolo de Ananás</span></div> <br>

  <div class="date-selector">
    <label for="dateSelect3">Seleccione a data:</label>
    <input type="date" id="dateSelect3">
  </div>

  <table>
    <tbody id="grid3"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime3">
    Horário de retirada: <span id="selectedHour3"></span>
  </div>
</div>
