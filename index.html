<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Levantamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brown:      #7B3F1E;
    --brown-dk:   #5C2E12;
    --brown-lt:   #A0522D;
    --brown-pale: #F5EDE6;
    --brown-mist: #EDD9CC;
    --gold:       #C8883A;
    --gold-lt:    #F3DEC0;
    --bg:         #FAF6F2;
    --surface:    #FFFFFF;
    --border:     #E2D0C4;
    --text:       #2A1A10;
    --text-md:    #5C3D2A;
    --text-muted: #9A7560;
    --green-bg:   #EAF5EC;
    --green-text: #1E6B30;
    --green-border: #7ABF88;
    --radius:     14px;
    --radius-sm:  8px;
    --shadow:     0 4px 24px rgba(91,42,10,0.10);
    --shadow-lg:  0 8px 40px rgba(91,42,10,0.16);
    --sans: 'DM Sans', system-ui, sans-serif;
    --serif: 'Playfair Display', Georgia, serif;
  }

  body {
    background: var(--bg);
    font-family:  Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1rem 3rem;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(200,136,58,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(123,63,30,.07) 0%, transparent 55%);
  }

  .page { max-width: 620px; margin: 0 auto; }

  /* ── Header ── */
  .page-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .page-header h1 {
    
    font-size: 26px; font-weight: 700;
    color: var(--brown-dk);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .page-header p {
    font-size: 14px; color: var(--text-muted);
    margin-top: 14px; line-height: 1.5;
  }

  /* ── Back link ── */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--brown); font-size: 13px; font-weight: 600;
    text-decoration: none; margin-bottom: 1.5rem;
    padding: 6px 12px; border-radius: 8px;
    border: 1.5px solid var(--brown-mist);
    background: var(--brown-pale);
    transition: all .15s;
  }
  .back-link:hover { background: var(--brown-mist); border-color: var(--brown); }

  /* ── Order card ── */
  .order-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 1.5rem;
  }

  /* Card top bar */
  .order-card-header {
    background: linear-gradient(135deg, var(--brown-lt) 0%, var(--brown-dk) 100%);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .order-card-header .label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: rgba(255,255,255,.7);
    margin-bottom: 2px;
  }
  .order-card-header .date-val {
    font-family: Arial, sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--gold-lt);
    letter-spacing: -.3px;
  }
  .order-status {
    background: rgba(255,255,255,.18);
    color: #fff;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,.25);
  }

  /* Product rows */
  .order-body { padding: 0 20px; }

  .product-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .product-row:last-child { border-bottom: none; }

  .product-row-left {
    display: flex; align-items: center; gap: 12px; min-width: 0;
  }
  .prod-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--brown-pale);
    border: 1.5px solid var(--brown-mist);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .prod-name {
    font-size: 15px; font-weight: 700;
    color: var(--brown-dk);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .prod-num {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    margin-top: 1px;
  }

  .horario-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--brown-pale);
    border: 1.5px solid var(--brown-mist);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px; font-weight: 800;
    color: var(--brown-dk);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: -.3px;
  }
 .horario-pill::before {
  content: "\f017"; /* ícone fa-clock */
  font-family: "Font Awesome 6 Free";
  font-weight: 900;
  font-size: 13px;
  margin-right: 6px;
}

  /* Footer */
  .order-footer {
    background: linear-gradient(90deg, var(--brown-pale), var(--gold-lt));
    border-top: 1.5px solid var(--brown-mist);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .order-footer .check-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--green-bg);
    border: 1.5px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .order-footer .ready-text {
    font-size: 14px; font-weight: 600;
    color: var(--green-text);
  }
  .order-footer .ready-text span {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
 i {
  font-size: 20px;
 }
  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .empty-icon {
    font-size: 3.5rem; margin-bottom: 16px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .empty-state h2 {
    font-family: Arial, sans-serif;
    font-size: 1.2rem; color: var(--brown-dk);
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 14px; color: var(--text-muted);
    line-height: 1.6; margin-bottom: 24px;
  }
  .btn-go {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--brown-lt) 0%, var(--brown-dk) 100%);
    color: #fff; border: none;
    padding: 13px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(92,46,18,.25);
    transition: all .18s;
  }
  .btn-go:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(92,46,18,.35); }

  /* ── Product emoji map ── */
</style>
</head>
<body>
<div class="page">



  <div class="page-header">
   
    
  </div>
    <div id="back-container"></div>
  <div id="content"></div>

</div>

<script>
  // Map product names to emojis
  const EMOJIS = {
    'pão':      '',
    'arrofada': '',
    'bolo':     '',
    'sanduíche':'',
  };
  function emojiFor(name) {
    const lower = name.toLowerCase();
    for (const [key, emoji] of Object.entries(EMOJIS)) {
      if (lower.includes(key)) return emoji;
    }
    return '🛍️';
  }

  // Format ISO date → DD/MM/AA
  function fmtDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y.slice(2)}`;
  }

 

  const content  = document.getElementById('content');


  const raw = localStorage.getItem('kweto_horarios');

  if (!raw) {
    // Empty state
 
    content.innerHTML = `
      <div class="empty-state">
        <i class="fa-regular fa-file"></i> <br>
        <h2>Sem horários confirmados</h2> <br>
        <p>Ainda não seleccionou nenhum horário de levantamento. Volte ao menu e escolha quando quer ir buscar os seus produtos.</p>
        <a class="btn-go" href="time.html">Seleccionar horário</a>
      </div>`;
  } else {
    const data = JSON.parse(raw);
    const { selections, prontoAte, confirmedAt } = data;
   document.getElementById('back-container').innerHTML = 
    `<a class="back-link" href="time.html">← Voltar</a>`;


  

    // Group selections by date
    const byDate = {};
    selections.forEach(s => {
      const key = s.data || 'sem-data';
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(s);
    });

    // Render one card per date group
    Object.entries(byDate).forEach(([dateKey, items]) => {
      const card = document.createElement('div');
      card.className = 'order-card';

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'order-card-header';
      const dateDisplay = dateKey !== 'sem-data' ? fmtDate(dateKey) : '—';
      hdr.innerHTML = `
        <div>
          <div class="label">Data de levantamento</div>
          <div class="date-val">${dateDisplay}</div>
        </div>
        <div class="order-status">Confirmado</div>`;
      card.appendChild(hdr);

      // Body — one row per product
      const body = document.createElement('div');
      body.className = 'order-body';

      items.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
          <div class="product-row-left">
            <div class="prod-icon">${emojiFor(item.nome)}</div>
            <div>
              <div class="prod-name">${item.nome}</div>
              <div class="prod-num">Produto ${idx + 1}</div>
            </div>
          </div>
          <div class="horario-pill">${item.horario}</div>`;
        body.appendChild(row);
      });

      card.appendChild(body);

      // Footer — "prontos até às X"
      const footer = document.createElement('div');
      footer.className = 'order-footer';
      footer.innerHTML = `
        <i class="fa-solid fa-circle-info"></i>
        <div class="ready-text">
          Os produtos estarão disponíveis para retirada às <span>${prontoAte}</span>
        </div>`;
      card.appendChild(footer);

      content.appendChild(card);
    });
  }
</script>
</body>
</html>
