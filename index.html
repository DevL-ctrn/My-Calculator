<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horário de levantamento</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family:'Inter',sans-serif;
  background:#f9f9f9;
  margin:0;
  padding:20px;
  color:#333;
}


input[type="date"] {
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:16px;
  padding:10px 15px;
  border:2px solid #b5651d;
  border-radius:8px;
  cursor:pointer;
  color:#333;
  background:#fff;
  transition:0.2s;
}
input[type="date"]:hover{border-color:#a0521a;}
input[type="date"]:focus{outline:none;border-color:#b5651d;box-shadow:0 0 6px rgba(181,101,29,0.4);}

h2{margin:0;font-weight:600;}


.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  width:95%;
  max-width:900px;
  margin:0 auto 30px auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.divider{border:none;height:1px;background:#eee;margin:15px 0;}

.product-name{font-weight:600;margin-bottom:10px;text-align:center;}
.product-name span{color:#b5651d;}


.table-title{font-weight:600;text-align:center;margin-bottom:10px;}


.date-selector{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:20px;}
.date-selector label{font-weight:600;}


table{border-collapse:collapse;margin:0 auto;width:95%;max-width:900px;}
td{
  border:1px solid #a0521a;
  width:18%;
  height:90px;
  text-align:center;
  vertical-align:middle;
  cursor:pointer;
  font-weight:600;
  position:relative;
  transition:0.2s;
}
td:hover{transform:scale(1.05);}
td.full{background:#ff4d4f;color:white;cursor:not-allowed;}
td.green{background:#d9f7be;}
td .remaining{position:absolute;bottom:5px;right:5px;font-size:12px;font-weight:500;}


.modal{display:none;position:fixed;z-index:10;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;border-radius:10px;padding:20px;width:90%;max-width:500px;text-align:center;}
.close{float:right;font-size:25px;font-weight:bold;cursor:pointer;}
.time-circle{width:50px;height:42px;border-radius:12px;background:#d9f7be;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:600;margin:5px;transition:0.2s;}
.time-circle.full{background:#ff4d4f;color:white;cursor:not-allowed;}
.time-circle:hover:not(.full){transform:scale(1.1);}


.selected-time-container{display:none;text-align:center;margin-top:15px;font-weight:600;}
.selected-time-container span{color:#b5651d;font-weight:600;}


@media(max-width:600px){
  td{height:70px;font-size:12px;padding:6px;}
  td .slot-label{font-size:12px;}
  td .remaining{font-size:8px!important;bottom:5px;right:5px;left:5px;text-align:right;}
  .modal-content{max-width:300px;}
}
</style>
</head>
<body>

<div class="card">
  
  <div class="table-title"><h2>Horários de Levantamento</h2></div>
  <hr class="divider">
  <div class="product-name">Produto: <span>Pão de Teste</span></div>

  <div class="date-selector">
    <label for="dateSelect1">Seleccione a data:</label>
    <input type="date" id="dateSelect1">
  </div>

  <table>
    <tbody id="grid1"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime1">Horário de retirada: <span id="selectedHour1"></span></div>

  <hr class="divider" style="margin-top:30px;">

 
  <div class="product-name">Produto: <span>Arrufada</span></div> <br>

  <div class="date-selector">
    <label for="dateSelect2">Seleccione a data:</label>
    <input type="date" id="dateSelect2">
  </div>

  <table>
    <tbody id="grid2"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime2">Horário de retirada: <span id="selectedHour2"></span></div>


  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeBtn" class="close">&times;</span>
      <h2>Selecione o horário disponível</h2> <br>
      <div id="times"></div>
    </div>
  </div>


  <hr class="divider" style="margin-top:30px;">

  <div class="product-name">Produto: <span>Bolo de Ananás</span></div> <br>

  <div class="date-selector">
    <label for="dateSelect3">Seleccione a data:</label>
    <input type="date" id="dateSelect3">
  </div>

  <table>
    <tbody id="grid3"></tbody>
  </table>

  <div class="selected-time-container" id="selectedTime3">
    Horário de retirada: <span id="selectedHour3"></span>
  </div>
</div>


<script>


const horariosCache = {
  p1: {},
  p2: {},
  p3: {}
};


const slotConfig1 = {1:{start:"08:00",end:"08:12"},2:{start:"08:12",end:"08:25"},3:{start:"08:25",end:"09:00"},
4:{start:"09:00",end:"09:45"},5:{start:"09:45",end:"10:10"},6:{start:"10:10",end:"10:20"},
7:{start:"10:20",end:"10:50"},8:{start:"10:50",end:"11:30"},9:{start:"11:30",end:"12:00"},
10:{start:"12:00",end:"12:15"},11:{start:"12:15",end:"13:00"},12:{start:"13:00",end:"13:20"},
13:{start:"13:20",end:"14:10"},14:{start:"14:10",end:"14:30"},15:{start:"14:30",end:"15:00"},
16:{start:"15:00",end:"15:40"},17:{start:"15:40",end:"16:00"},18:{start:"16:00",end:"16:50"},
19:{start:"16:50",end:"17:10"},20:{start:"17:10",end:"17:45"},21:{start:"17:45",end:"18:00"},
22:{start:"18:00",end:"18:20"},23:{start:"18:20",end:"19:00"},24:{start:"19:00",end:"19:25"},
25:{start:"19:25",end:"20:00"}};

const slotCapacity1 = {1:12,2:15,3:5,4:0,5:18,6:7,7:0,8:3,9:3,10:10,
11:2,12:0,13:9,14:6,15:6,16:4,17:0,18:11,19:1,20:5,
21:8,22:0,23:13,24:2,25:7};

const slotConfig2 = {...slotConfig1};
const slotCapacity2 = {1:10,2:0,3:8,4:0,5:5,6:12,7:0,8:7,9:3,10:0,
11:5,12:0,13:9,14:6,15:6,16:4,17:0,18:11,19:1,20:5,
21:8,22:0,23:13,24:2,25:7};

const slotConfig3 = {...slotConfig1};
const slotCapacity3 = {
1:3,2:2,3:0,4:0,5:4,6:1,7:0,8:2,9:1,10:0,
11:2,12:0,13:3,14:1,15:2,16:1,17:0,18:2,19:0,20:1,
21:2,22:0,23:1,24:1,25:0
};


function gerarHorarios(start, end, capacidade){
  let arr=[];
  let [h,m]=start.split(":").map(Number);
  let [eh,em]=end.split(":").map(Number);

  let totalMin = (eh*60+em)-(h*60+m);

  let index = 0;

  while(h<eh || (h===eh && m<em)){
    let time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

    let full = index >= capacidade; 

    arr.push({ time, full });

    index++;
    m++;
    if(m===60){m=0;h++;}
  }

  return arr;
}


function gerarTudo(){
  for(let i=1;i<=25;i++){
    horariosCache.p1[i] = gerarHorarios(slotConfig1[i].start, slotConfig1[i].end, slotCapacity1[i]);
    horariosCache.p2[i] = gerarHorarios(slotConfig2[i].start, slotConfig2[i].end, slotCapacity2[i]);
    horariosCache.p3[i] = gerarHorarios(slotConfig3[i].start, slotConfig3[i].end, slotCapacity3[i]);
  }
}


function gerarTabela(gridId, config, capacity){
  const grid=document.getElementById(gridId);
  grid.innerHTML="";

  for(let r=0;r<5;r++){
    let tr=document.createElement("tr");

    for(let c=0;c<5;c++){
      let id=r*5+c+1;
      let td=document.createElement("td");

      let cap=capacity[id];
      let isFull=cap===0;

      td.className=isFull?"full":"green";
      td.dataset.id=id;

      td.innerHTML=`
        <div>${config[id].start} - ${config[id].end}</div>
        <div class="remaining">${isFull?"Indisponível":cap+"5 produtos restantes"}</div>
      `;

      tr.appendChild(td);
    }

    grid.appendChild(tr);
  }
}


function toMin(t){
  let [h,m]=t.split(":").map(Number);
  return h*60+m;
}


function encontrarMaisProximo(target, cache){
  let melhor=null;
  let menor=Infinity;

  Object.values(cache).forEach(lista=>{
    lista.forEach(h=>{
      if(h.full) return;

      let diff=Math.abs(toMin(h.time)-toMin(target));

      if(diff<menor){
        menor=diff;
        melhor=h.time;
      }
    });
  });

  return melhor;
}


const modal=document.getElementById("modal");
const timesDiv=document.getElementById("times");

document.getElementById("closeBtn").onclick=()=>modal.style.display="none";
window.onclick=e=>{if(e.target===modal) modal.style.display="none";};

function ativarModal(gridId, cacheKey, selectedId, hourId, isMain=false){
  document.querySelectorAll(`#${gridId} td.green`).forEach(td=>{
    td.onclick=()=>{
      let id=td.dataset.id;

      let horarios = horariosCache[cacheKey][id]; 

      timesDiv.innerHTML="";

      horarios.forEach(h=>{
        let d=document.createElement("div");
        d.className="time-circle"+(h.full?" full":"");
        d.innerText=h.time;

        if(!h.full){
          d.onclick=()=>{
            document.getElementById(hourId).innerText=h.time;
            document.getElementById(selectedId).style.display="block";
            modal.style.display="none";

           
            if(isMain){
              let prox2 = encontrarMaisProximo(h.time, horariosCache.p2);
              let prox3 = encontrarMaisProximo(h.time, horariosCache.p3);

              if(prox2){
                selectedHour2.innerText=prox2;
                selectedTime2.style.display="block";
              }

              if(prox3){
                selectedHour3.innerText=prox3;
                selectedTime3.style.display="block";
              }
            }
          };
        }

        timesDiv.appendChild(d);
      });

      modal.style.display="flex";
    };
  });
}


gerarTudo();

gerarTabela("grid1",slotConfig1,slotCapacity1);
gerarTabela("grid2",slotConfig2,slotCapacity2);
gerarTabela("grid3",slotConfig3,slotCapacity3);


ativarModal("grid1","p1","selectedTime1","selectedHour1",true);


ativarModal("grid2","p2","selectedTime2","selectedHour2");
ativarModal("grid3","p3","selectedTime3","selectedHour3");



const d1=document.getElementById("dateSelect1");
const d2=document.getElementById("dateSelect2");
const d3=document.getElementById("dateSelect3");

let today=new Date().toISOString().split("T")[0];

[d1,d2,d3].forEach(d=>{
  d.min=today;

  let max=new Date();
  max.setDate(new Date().getDate()+7);
  d.max=max.toISOString().split("T")[0];
});


d1.addEventListener("input",()=>{
  d2.value=d1.value;
  d3.value=d1.value;
});
</script>

</body>
</html>
