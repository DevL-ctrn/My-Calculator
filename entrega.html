<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KwetoBread — Horários de Entrega</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --kb-primary:       #D4A017;
  --kb-primary-dark:  #8B4513;
  --kb-primary-light: #E8B84B;
  --kb-bg-primary:    #FAF7F2;
  --kb-bg-secondary:  #FFFFFF;
  --kb-bg-tertiary:   #F5EFE6;
  --kb-border-light:  #E8D9C8;
  --kb-text-primary:  #1C0F05;
  --kb-text-secondary:#4A2E18;
  --kb-text-tertiary: #9A7A5A;

  /* Delivery green palette */
  --dv-green:         #34D399;
  --dv-green-dark:    #1A6B3C;
  --dv-green-bg:      #D1FAE5;
  --dv-green-border:  #6EE7B7;
  --red-bg:           #FADADD;
  --red-bd:           #F1A0A0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  background: var(--kb-bg-primary);
  color: var(--kb-text-primary);
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── HEADER ── */
.kb-header {
  height: 60px; background: var(--kb-bg-secondary);
  border-bottom: 1.5px solid var(--kb-border-light);
  display: flex; align-items: center; padding: 0 28px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(139,69,19,.06);
}
.kb-header-spacer { flex: 1; }
.kb-header-back {
  display: flex; align-items: center; gap: 8px;
  font-size: .82rem; font-weight: 700; color: var(--kb-text-secondary);
  text-decoration: none; padding: 8px 14px; border-radius: 10px;
  border: 1.5px solid var(--kb-border-light); background: var(--kb-bg-tertiary);
  transition: all .15s;
}
.kb-header-back:hover { border-color: var(--dv-green-dark); color: var(--dv-green-dark); }

/* ── PAGE ── */
.page { max-width: 980px; margin: 0 auto; padding: 32px 20px 60px; }

/* ── PAGE TITLE ── */
.page-title-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
}
.page-title-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, var(--dv-green) 0%, var(--dv-green-dark) 100%);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; box-shadow: 0 4px 14px rgba(52,211,153,.3);
}
.page-title h1 { font-size: 1.5rem; font-weight: 900; color: var(--kb-text-primary); letter-spacing: -.4px; }
.page-title p { font-size: .82rem; color: var(--kb-text-tertiary); font-weight: 500; margin-top: 2px; }

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--kb-bg-secondary);
  border: 1.5px solid var(--kb-border-light);
  border-radius: 20px; padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 4px 18px rgba(139,69,19,.05);
}

.product-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.product-header-left { display: flex; align-items: center; gap: 10px; }
.product-badge {
  background: var(--kb-bg-tertiary); color: var(--kb-primary-dark);
  border: 1.5px solid var(--kb-border-light); border-radius: 8px;
  padding: 4px 11px; font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em;
}
.product-name { font-size: .95rem; font-weight: 800; color: var(--kb-text-primary); }

/* ── DATE ROW ── */
.date-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.date-row label { font-size: .78rem; font-weight: 700; color: var(--kb-text-tertiary); text-transform: uppercase; letter-spacing: .05em; }
.date-row input[type=date] {
  font-size: .85rem; font-weight: 700; padding: 8px 12px;
  border-radius: 10px; border: 1.5px solid var(--kb-border-light);
  background: var(--kb-bg-tertiary); color: var(--dv-green-dark);
  transition: all .2s;
}
.date-row input[type=date]:focus {
  border-color: var(--dv-green); box-shadow: 0 0 0 3px rgba(52,211,153,.15);
}
.date-display {
  font-size: .85rem; font-weight: 700; padding: 8px 12px;
  border-radius: 10px; border: 1.5px solid var(--kb-border-light);
  background: var(--kb-bg-tertiary); color: var(--dv-green-dark);
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: .68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: .07em; color: var(--kb-text-tertiary);
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.section-label::after { content:""; flex:1; height:1px; background: var(--kb-border-light); }

/* ── SLOTS TABLE ── */
.slots-table {
  width: 100%; border-collapse: collapse;
  border: 1.5px solid var(--kb-border-light);
  border-radius: 14px; overflow: hidden;
  margin-bottom: 18px; table-layout: fixed;
}
.slots-table td {
  width: 20%; border: 1px solid var(--kb-border-light);
  padding: 0; vertical-align: top;
}
.slots-table td.empty    { background: var(--kb-bg-tertiary); }
td.available             { background: var(--dv-green-bg); }
td.unavailable           { background: var(--red-bg); }

.slot-box {
  width: 100%; min-height: 78px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 6px 26px 6px; position: relative;
  cursor: pointer; border: none; background: transparent;
  text-align: center; font-family: 'Sora', sans-serif; transition: filter .12s;
}
.slot-box:hover            { filter: brightness(.93); }
.slot-box:active           { filter: brightness(.85); }
.slot-box.unavailable      { cursor: not-allowed; }
.slot-box.selected::after  { content:''; position:absolute; inset:0; border:2.5px solid var(--dv-green-dark); pointer-events:none; }

.slot-time-text {
  font-size: .78rem; font-weight: 700; color: var(--kb-text-primary); line-height: 1.3; text-align: center;
}
.slot-count-label {
  position: absolute; bottom: 4px; right: 5px;
  font-size: .6rem; font-weight: 600; color: var(--kb-text-secondary);
  text-align: right; line-height: 1.2; white-space: nowrap;
}

/* ── RESULT MSG ── */
.result-msg {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-size: .85rem; font-weight: 600; margin-top: 10px;
  padding: 12px 16px; background: var(--kb-bg-tertiary);
  border-left: 3px solid var(--dv-green); border-radius: 0 12px 12px 0;
}
.result-msg strong { color: var(--dv-green-dark); font-weight: 800; }
.auto-tag {
  font-size: .65rem; font-weight: 800;
  background: rgba(52,211,153,.15); color: var(--dv-green-dark);
  border-radius: 6px; padding: 2px 8px; letter-spacing: .04em;
}
.edit-btn {
  font-size: .75rem; font-weight: 700; color: var(--dv-green-dark);
  background: none; border: 1.5px solid var(--kb-border-light);
  border-radius: 8px; padding: 3px 10px; cursor: pointer;
  font-family: 'Sora', sans-serif; margin-left: 4px; transition: all .15s;
}
.edit-btn:hover { background: var(--kb-bg-tertiary); border-color: var(--dv-green); }

/* ── DELIVERY INFO BANNER ── */
.delivery-info-banner {
  background: linear-gradient(135deg, var(--dv-green-dark) 0%, #0F4A2A 100%);
  border-radius: 16px; padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px; color: #fff;
}
.delivery-info-icon {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  background: rgba(52,211,153,.2); border: 1.5px solid rgba(52,211,153,.35);
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--dv-green);
}
.delivery-info-text { font-size: .82rem; font-weight: 500; opacity: .85; line-height: 1.5; }
.delivery-info-text strong { display: block; font-size: .9rem; font-weight: 800; opacity: 1; margin-bottom: 2px; }

/* ── CONFIRM BAR ── */
.confirm-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--kb-bg-secondary); border-top: 1.5px solid var(--kb-border-light);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  box-shadow: 0 -4px 20px rgba(139,69,19,.09); z-index: 200;
}
.confirm-summary { font-size: .8rem; font-weight: 600; color: var(--kb-text-tertiary); line-height: 1.4; }
.btn-confirm {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--dv-green) 0%, var(--dv-green-dark) 100%);
  color: #fff; border: none; padding: 13px 24px; border-radius: 12px;
  font-size: .9rem; font-weight: 800;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(52,211,153,.3); transition: all .18s;
}
.btn-confirm:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(52,211,153,.4); }
.btn-confirm:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── POPUP ── */
.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(28,15,5,.4); backdrop-filter: blur(4px);
  z-index: 1000; align-items: center; justify-content: center;
}
.popup-overlay.open { display: flex; }
.popup-box {
  background: var(--kb-bg-secondary);
  border: 1.5px solid var(--kb-border-light);
  border-radius: 20px; padding: 24px;
  width: 90%; max-width: 520px; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 16px 48px rgba(28,15,5,.18); position: relative;
  animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from { opacity:0; transform:scale(.94) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
.popup-title { font-size: .9rem; font-weight: 800; color: var(--kb-text-primary); margin-bottom: 14px; padding-right: 28px; }
.popup-close {
  position: absolute; top: 14px; right: 14px;
  background: var(--kb-bg-tertiary); border: 1.5px solid var(--kb-border-light);
  border-radius: 8px; cursor: pointer; font-size: .85rem; color: var(--kb-text-tertiary);
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.popup-close:hover { background: var(--kb-border-light); color: var(--kb-text-primary); }

.times-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.time-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid transparent; cursor: pointer;
  font-size: .8rem; font-weight: 700;
  transition: filter .1s;
}
.time-btn.available { background: var(--dv-green-bg); border-color: var(--dv-green-border); color: var(--kb-text-primary); }
.time-btn.unavailable { background: var(--red-bg); border-color: var(--red-bd); color: var(--kb-text-secondary); cursor: not-allowed; opacity: .7; }
.time-btn.available:hover { filter: brightness(.9); }
.time-btn.selected { outline: 2.5px solid var(--dv-green-dark); outline-offset: 1px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--dv-green-dark); color: #fff;
  padding: 12px 22px; border-radius: 12px; font-size: .85rem; font-weight: 700;
  box-shadow: 0 6px 20px rgba(26,107,60,.3); opacity: 0;
  transition: all .3s; pointer-events: none; z-index: 9000; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .slot-box { min-height: 60px; padding: 6px 4px 26px 4px; }
  .slot-time-text { font-size: .65rem; }
  .slot-count-label { font-size: .55rem; }
  .confirm-bar { flex-direction: column; align-items: stretch; gap: 10px; }
  .btn-confirm { justify-content: center; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="kb-header">
  <div class="kb-header-spacer"></div>
</header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="page">

  <a href="index.html" class="kb-header-back"><i class="fas fa-arrow-left"></i> Voltar para o Checkout</a><br><br>

  <div class="page-title-row">
    <div class="page-title-icon"><i class="fas fa-motorcycle"></i></div>
    <div class="page-title">
      <h1>Horários de Entrega</h1>
      <p>Escolha quando quer receber cada produto em casa.</p>
    </div>
  </div>

  <!-- Info banner -->
  <div class="delivery-info-banner">
    <div class="delivery-info-icon"><i class="fas fa-circle-info"></i></div>
    <div class="delivery-info-text">
      <strong>Entrega ao Domicílio</strong>
      Seleccione uma janela horária para a entrega dos seus produtos. O estafeta irá ao endereço indicado no checkout.
    </div>
  </div>

  <div id="products-container"></div>
</div>

<!-- Popup -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup-box">
    <button class="popup-close" id="popup-close-btn"><i class="fas fa-times"></i></button>
    <div class="popup-title" id="popup-title"></div>
    <div class="times-grid" id="popup-times-grid"></div>
  </div>
</div>

<!-- Confirm bar -->
<div class="confirm-bar">
  <span class="confirm-summary" id="info">Nenhum horário de entrega selecionado</span>
  <button class="btn-confirm" id="btn-confirm" disabled>
    <i class="fas fa-check"></i> Confirmar Entrega
  </button>
</div>

<script>
// ── Utils ──────────────────────────────────────────────────────
function fmt(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function genTimes(range) {
  const [s,e] = range.split('-');
  const [sh,sm] = s.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  const r = [];
  for (let m = sh*60+sm; m <= eh*60+em; m++) r.push(fmt(m));
  return r;
}
function toMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function toISO(d) { return d.toISOString().split('T')[0]; }
function getMinDate() { return toISO(new Date()); }
function getMaxDate() { const d = new Date(); d.setDate(d.getDate()+7); return toISO(d); }
function fmtDateBR(iso) { if(!iso) return '—'; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y.slice(2)}`; }

// ── Build Slots ──
// Delivery windows are wider (30 min slots) to reflect door-to-door logistics
function buildSlots(sh,sm,ch,cm,slotMin,unavailIdx=[]) {
  const slots=[]; let cur=sh*60+sm; const closing=ch*60+cm; let idx=0;
  while(cur+slotMin<=closing) {
    const range=fmt(cur)+'-'+fmt(cur+slotMin);
    const isUnavail=unavailIdx.includes(idx);
    const count=isUnavail?0:Math.floor(Math.random()*5)+1;
    const unavail=isUnavail?[]:genTimes(range).filter(()=>Math.random()<.2);
    slots.push({range,count,unavail}); cur+=slotMin; idx++;
  }
  return slots;
}
function getUnavail(slot) { return slot.count===0?genTimes(slot.range):slot.unavail; }

// ── Data — delivery slots (30 min windows, starts a bit later than pickup) ──
const PRODUCTS = [
  { id:0, name:'Pão Quente',     slots: buildSlots(9, 0, 20, 0, 30, [1,5,8,13]) },
  { id:1, name:'Arrofada',       slots: buildSlots(9,30, 20, 0, 30, [2,6,10,15]) },
  { id:2, name:'Bolo de Ananás', slots: buildSlots(10,0, 20, 0, 30, [0,4,9,14]) },
];

const state = { dates:{}, selectedSlot:{}, selectedTime:{} };

function findClosestTime(refTime, pid) {
  const ref = toMins(refTime); const p = PRODUCTS[pid];
  let best=null, bestDiff=Infinity;
  p.slots.forEach((slot,si) => {
    const unavail = getUnavail(slot);
    genTimes(slot.range).forEach(t => {
      if (unavail.includes(t)) return;
      const d = Math.abs(toMins(t)-ref);
      if (d < bestDiff) { bestDiff=d; best={slotIdx:si,time:t}; }
    });
  });
  return best;
}

// ── Popup ──
const overlay  = document.getElementById('popup-overlay');
const popTitle = document.getElementById('popup-title');
const popGrid  = document.getElementById('popup-times-grid');
const popClose = document.getElementById('popup-close-btn');

function closePopup() { overlay.classList.remove('open'); }
popClose.addEventListener('click', closePopup);
overlay.addEventListener('click', e => { if(e.target===overlay) closePopup(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closePopup(); });

function openPopup(pi, si) {
  const slot = PRODUCTS[pi].slots[si];
  const times = genTimes(slot.range);
  const unavail = getUnavail(slot);
  popTitle.innerHTML = `<i class="fas fa-motorcycle" style="color:var(--dv-green);margin-right:6px;"></i> Janelas de entrega — ${slot.range}`;
  popGrid.innerHTML = '';
  times.forEach(t => {
    const avail = !unavail.includes(t);
    const tb = document.createElement('button');
    tb.type='button';
    tb.className='time-btn '+(avail?'available':'unavailable');
    if (state.selectedTime[pi]===t) tb.classList.add('selected');
    tb.textContent=t;
    if (avail) {
      tb.addEventListener('click', () => {
        state.selectedTime[pi]=t; state.selectedSlot[pi]=si;
        if (pi===0) {
          PRODUCTS.forEach((_,i) => {
            if(i===0) return;
            const c=findClosestTime(t,i);
            if(c) { state.selectedSlot[i]=c.slotIdx; state.selectedTime[i]=c.time; }
          });
        }
        closePopup(); render();
      });
    }
    popGrid.appendChild(tb);
  });
  overlay.classList.add('open');
}

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ── Confirm bar ──
function updateConfirm() {
  const btn=document.getElementById('btn-confirm');
  const info=document.getElementById('info');
  const times=Object.values(state.selectedTime);
  const hasDate = state.dates[0] && state.dates[0]!=='';
  if (times.length>0 && hasDate) {
    btn.disabled=false;
    info.textContent=`${times.length} produto(s) com horário de entrega: ${times.join(', ')}`;
  } else if (times.length>0) {
    btn.disabled=true; info.textContent='Seleccione uma data para confirmar';
  } else {
    btn.disabled=true; info.textContent='Nenhum horário de entrega selecionado';
  }
}

document.getElementById('btn-confirm').addEventListener('click', function() {
  if (this.disabled) return;
  const selections = PRODUCTS.map((prod,pi) => ({
    id:prod.id, nome:prod.name,
    horario:state.selectedTime[pi]||null,
    data:state.dates[pi]||state.dates[0]||null
  })).filter(s=>s.horario);
  const times = selections.map(s=>toMins(s.horario));
  const maxTime = Math.max(...times);
  const prontoAte = fmt(maxTime);
  // Save with a different key so pickup and delivery states are independent
  localStorage.setItem('kweto_horarios_entrega', JSON.stringify({ selections, prontoAte, confirmedAt:new Date().toISOString() }));
  showToast('✓ Horário de entrega guardado!');
  setTimeout(() => { window.location.href='index.html'; }, 1400);
});

// ── Render ──
function render() {
  const container = document.getElementById('products-container');
  container.innerHTML='';
  const minDate=getMinDate(), maxDate=getMaxDate();

  PRODUCTS.forEach((prod,pi) => {
    const card=document.createElement('div'); card.className='product-card';

    // Header
    const hdr=document.createElement('div'); hdr.className='product-header';
    hdr.innerHTML=`
      <div class="product-header-left">
        <span class="product-badge">Produto ${pi+1}</span>
        <span class="product-name">${prod.name}</span>
      </div>`;
    card.appendChild(hdr);

    // Date row
    const dateRow=document.createElement('div'); dateRow.className='date-row';
    if (pi===0) {
      const lbl=document.createElement('label'); lbl.textContent='Data de entrega:';
      const inp=document.createElement('input'); inp.type='date';
      inp.min=minDate; inp.max=maxDate; inp.value=state.dates[0]||'';
      inp.addEventListener('change', e => { state.dates[0]=e.target.value; render(); });
      dateRow.appendChild(lbl); dateRow.appendChild(inp);
    } else {
      const lbl=document.createElement('label'); lbl.textContent='Data:';
      const disp=document.createElement('span'); disp.className='date-display';
      disp.textContent=fmtDateBR(state.dates[0]);
      dateRow.appendChild(lbl); dateRow.appendChild(disp);
    }
    card.appendChild(dateRow);

    // Section label
    const slbl=document.createElement('div'); slbl.className='section-label';
    slbl.textContent=`${prod.slots.length} janelas de entrega disponíveis`;
    card.appendChild(slbl);

    // Slots table
    const table=document.createElement('table'); table.className='slots-table';
    const tbody=document.createElement('tbody');
    const COLS=5; const slots=prod.slots;
    for(let row=0;row<Math.ceil(slots.length/COLS);row++) {
      const tr=document.createElement('tr');
      for(let col=0;col<COLS;col++) {
        const si=row*COLS+col; const td=document.createElement('td');
        if(si>=slots.length) { td.className='empty'; tr.appendChild(td); continue; }
        const slot=slots[si];
        const isAvail=slot.count>0;
        const isSel=state.selectedSlot[pi]===si;
        td.className=isAvail?'available':'unavailable';
        const box=document.createElement('button'); box.type='button';
        box.className='slot-box'+(isSel?' selected':'')+(isAvail?'':' unavailable');
        box.innerHTML=`
          <span class="slot-time-text">${slot.range}</span>
          <span class="slot-count-label">${'Disponível ':'Indisponível'}</span>`;
        if(isAvail) {
          box.addEventListener('click', () => {
            state.selectedSlot[pi]=si; openPopup(pi,si); render();
          });
        }
        td.appendChild(box); tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody); card.appendChild(table);

    // Result
    const selTime=state.selectedTime[pi];
    if(selTime) {
      const isAuto=pi!==0&&state.selectedTime[0];
      const msg=document.createElement('div'); msg.className='result-msg';
      msg.innerHTML=`<i class="fas fa-check-circle" style="color:var(--dv-green);"></i> Horário de entrega: <strong>${selTime}</strong>${isAuto?' <span class="auto-tag">AUTO</span>':''}`;
      if(pi!==0) {
        const eb=document.createElement('button'); eb.className='edit-btn'; eb.textContent='Alterar';
        eb.addEventListener('click', ()=>openPopup(pi,state.selectedSlot[pi]));
        msg.appendChild(eb);
      }
      card.appendChild(msg);
    }

    container.appendChild(card);
  });

  updateConfirm();
}

render();
</script>
</body>
</html>
